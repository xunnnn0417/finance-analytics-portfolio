<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#173f72"/>
      <stop offset="1" stop-color="#245f9f"/>
    </linearGradient>
    <style>
      .title{font:700 48px "Microsoft JhengHei",Arial,sans-serif;fill:#fff}
      .sub{font:400 22px "Microsoft JhengHei",Arial,sans-serif;fill:#eaf2fb}
      .label{font:700 16px Arial,sans-serif;fill:#f3a53a;letter-spacing:2px}
      .num{font:800 42px Arial,sans-serif;fill:#164b87}
      .cap{font:400 17px "Microsoft JhengHei",Arial,sans-serif;fill:#34465c}
      .step{font:700 19px "Microsoft JhengHei",Arial,sans-serif;fill:#164b87}
      .small{font:400 15px "Microsoft JhengHei",Arial,sans-serif;fill:#607086}
    </style>
  </defs>
  <rect width="1200" height="420" rx="18" fill="#f6f8fb"/>
  <rect width="1200" height="178" rx="18" fill="url(#bg)"/>
  <path d="M70 150 C220 50, 340 220, 490 90 S760 180, 950 55" fill="none" stroke="#0b274b" stroke-width="4" opacity=".18"/>
  <text x="60" y="55" class="label">FINANCE ANALYTICS PORTFOLIO</text>
  <text x="60" y="112" class="title">金融市場資料分析作品集</text>
  <text x="60" y="151" class="sub">用資料清理、Python 回測與風險驗證，把市場想法整理成可檢查的流程。</text>

  <g transform="translate(60 215)">
    <rect width="310" height="90" rx="12" fill="#fff" stroke="#d7dfeb"/>
    <text x="24" y="48" class="num">165 萬+</text>
    <text x="24" y="73" class="cap">US100 一分鐘資料整理</text>
  </g>
  <g transform="translate(445 215)">
    <rect width="310" height="90" rx="12" fill="#fff" stroke="#d7dfeb"/>
    <text x="24" y="48" class="num">270</text>
    <text x="24" y="73" class="cap">參數與壓力測試組合</text>
  </g>
  <g transform="translate(830 215)">
    <rect width="310" height="90" rx="12" fill="#fff" stroke="#d7dfeb"/>
    <text x="24" y="48" class="num">3 市場</text>
    <text x="24" y="73" class="cap">ETHUSDT / US100 / XAUUSD</text>
  </g>

  <g transform="translate(90 340)">
    <text class="step">取得資料</text>
    <text y="25" class="small">market data</text>
  </g>
  <text x="250" y="358" style="font:800 28px Arial;fill:#c58a2b">→</text>
  <g transform="translate(315 340)">
    <text class="step">清理資料</text>
    <text y="25" class="small">quality check</text>
  </g>
  <text x="475" y="358" style="font:800 28px Arial;fill:#c58a2b">→</text>
  <g transform="translate(540 340)">
    <text class="step">Python 回測</text>
    <text y="25" class="small">backtesting</text>
  </g>
  <text x="720" y="358" style="font:800 28px Arial;fill:#c58a2b">→</text>
  <g transform="translate(785 340)">
    <text class="step">風險驗證</text>
    <text y="25" class="small">Monte Carlo / walk-forward</text>
  </g>
  <text x="1010" y="358" style="font:800 28px Arial;fill:#c58a2b">→</text>
  <g transform="translate(1060 340)">
    <text class="step">結論</text>
    <text y="25" class="small">limits</text>
  </g>
</svg>
